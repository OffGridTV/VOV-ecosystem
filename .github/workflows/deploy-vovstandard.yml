name: Deploy VOV Standard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'websites/vovstandard/**'
      - '.github/workflows/deploy-vovstandard.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-vovstandard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deploy bundle
        run: |
          mkdir -p _site
          cp -r websites/vovstandard/. _site/
          cp -r components _site/components
          cp -r assets _site/assets
          cp -r constitution _site/constitution
          cp -r investigations _site/investigations
          mkdir -p _site/websites/vovverified
          cp websites/vovverified/style.css _site/websites/vovverified/style.css
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
