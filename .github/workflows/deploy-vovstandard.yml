name: Deploy VOV Standard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'websites/vovstandard/**'
      - '.github/workflows/deploy-vovstandard.yml'

permissions:
  contents: read

concurrency:
  group: publish-vovstandard-deploy-repo
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
      DEPLOY_REPO_OWNER: ${{ vars.DEPLOY_REPO_OWNER || github.repository_owner }}
      DEPLOY_REPO_NAME: vovstandard-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy token
        run: |
          if [ -z "$DEPLOY_REPO_TOKEN" ]; then
            echo "::error::Missing DEPLOY_REPO_TOKEN. Add it in vov-ecosystem -> Settings -> Secrets and variables -> Actions -> Repository secrets."
            exit 1
          fi

      - name: Build deploy bundle
        run: |
          mkdir -p _site
          cp -r websites/vovstandard/. _site/
          mkdir -p _site/assets
          cp assets/EVAI\ Logo.svg _site/assets/EVAI\ Logo.svg
          cp assets/VOV\ landing\ page\ image\ 7-26.png _site/assets/VOV\ landing\ page\ image\ 7-26.png
          cp -r constitution _site/constitution
          cp -r investigations _site/investigations
          mkdir -p _site/websites/vovverified
          cp websites/vovverified/style.css _site/websites/vovverified/style.css
          touch _site/.nojekyll

      - name: Publish bundle to deploy repository
        run: |
          set -euo pipefail

          mkdir -p deploy-repo
          cd deploy-repo

          git init -b main
          git remote add origin "https://x-access-token:${DEPLOY_REPO_TOKEN}@github.com/${DEPLOY_REPO_OWNER}/${DEPLOY_REPO_NAME}.git"

          if git fetch origin main; then
            git checkout -B main origin/main
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a ../_site/. .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No deployment changes to publish."
            exit 0
          fi

          git commit -m "Deploy VOV Standard from ${GITHUB_SHA}"
          git push origin main

      - name: Verify HTTPS endpoints
        run: |
          set -euo pipefail

          echo "Checking apex domain..."
          curl -fIsS https://vovstandard.com/ > /dev/null

          echo "Checking www redirect and certificate..."
          curl -fIsS https://www.vovstandard.com/ > /dev/null

          echo "HTTPS checks passed for vovstandard.com and www.vovstandard.com"
